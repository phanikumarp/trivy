server:
  addr: ":5001"
  certificate: "/certs/cert.pem"
  key: "/certs/key.pem"

token:
  issuer: "Trivy auth server"  # Must match issuer in the Registry config.
  expiration: 900

users:
  # Password is specified as a BCrypt hash. Use `htpasswd -nB USERNAME` to generate.
  # Set the password hashes via environment variables; do NOT hardcode them here.
  "admin":
    password: "${ADMIN_BCRYPT_PASSWORD}"
  "test":
    password: "${TEST_BCRYPT_PASSWORD}"

acl:
  - match: {account: "admin"}
    actions: ["*"]
    comment: "Admin has full access to everything."
  - match: {account: "test"}
    actions: ["pull"]
    comment: "User \"test\" can pull stuff."
